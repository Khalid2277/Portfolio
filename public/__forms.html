<!doctype html>
<!--
  Netlify Forms registration decoy. Netlify's form-detection scanner reads
  every static HTML file in the build at deploy time. The React contact form
  on /contact is rendered through next/font + a client component, and in
  practice Netlify sometimes fails to pick the form definition out of the
  hydrated markup. This static file removes the ambiguity: the form lives
  here as plain HTML with every field name exactly matching ContactForm.
  Netlify routes any POST containing `form-name=contact` to this bucket.

  This page is never linked from the site and is only rendered for the
  scanner. Browsers landing here see a near-empty document.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Form registration</title>
  <meta name="robots" content="noindex" />
</head>
<body>
  <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" netlify>
    <input type="hidden" name="form-name" value="contact" />
    <input type="text" name="bot-field" />
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="text" name="company" />
    <input type="text" name="topic" />
    <textarea name="message"></textarea>
  </form>
</body>
</html>
