# Netlify configuration for AlfaTechLabs (https://alfatechlabs.net)
# Next.js 15 App Router with output: 'export' produces a static `out/` directory
# that Netlify serves identically to a vanilla static site.

[build]
  command = "npm run build"
  publish = "out"

# Next handles HTML/CSS/JS minification + image processing in its own build.
# We disable Netlify's processing to avoid double work and inconsistent output.
[build.processing]
  skip_processing = true

[build.processing.images]
  compress = true

# ---------------------------------------------------------------------------
# Redirects
# Most legacy redirects are no longer needed: Next emits real /<route>.html
# files matching today's URLs. The only one that survives is /solutions →
# /portfolio (was 301 in legacy and is preserved by app/solutions/page.tsx
# at runtime; we keep this rule so the redirect happens at the edge for SEO).
# ---------------------------------------------------------------------------

[[redirects]]
  from = "/solutions"
  to = "/portfolio"
  status = 301

# ---------------------------------------------------------------------------
# Security & caching headers — preserved verbatim from the legacy config.
# CSP allows: Google Fonts (now self-hosted via next/font but we keep the
# allowance for any inline previews), formsubmit.co for the contact form,
# and 'unsafe-inline' for styles (Next emits inline critical CSS during SSG).
# ---------------------------------------------------------------------------

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://formsubmit.co; form-action 'self' https://formsubmit.co; frame-ancestors 'none'; base-uri 'self'"

# Long cache for fingerprinted Next.js static chunks
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long cache for non-Next assets (favicon, OG image, etc.)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for HTML so updates ship instantly
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Discoverability files — cache for an hour, allow revalidation
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"
    Cache-Control = "public, max-age=86400"
